<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMT Studio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #ccc;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: #111;
    border-bottom: 1px solid #2e2e2e;
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 16px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .title-group {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .title-group svg { color: #e53; flex-shrink: 0; }
  h1 { font-size: 1rem; font-weight: 600; color: #eee; letter-spacing: 0.03em; white-space: nowrap; }

  .btn-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  #bp-board-select {
    background: #181818;
    border: 1px solid #2e2e2e;
    border-radius: 3px;
    color: #ccc;
    font-size: 0.78rem;
    padding: 4px 6px;
    outline: none;
    min-width: 160px;
    cursor: pointer;
  }
  #bp-board-select:focus { border-color: #4d9; }

  #input-board { 
    width: 160px; 
    opacity: 0.7; 
    cursor: default;
    background: #141414;
  }

  #input-filename {
    width: 200px;
    font-family: monospace;
    opacity: 0.7;
    cursor: default;
    background: #141414;
  }

  button {
    padding: 5px 12px;
    border: none;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.82; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  #btn-clear    { background: #3a1a1a; color: #e55; border: 1px solid #5a2a2a; }
  #btn-close    { background: #3a1a1a; color: #e55; border: 1px solid #5a2a2a; }
  #btn-open     { background: #1a2a3a; color: #6af; border: 1px solid #2a3a5a; }
  #btn-save     { background: #1a3a1a; color: #4d4; border: 1px solid #2a5a2a; }
  #btn-saveas   { background: #1a2e1a; color: #3b3; border: 1px solid #254525; }
  #btn-download { background: #1a3a1a; color: #4d4; border: 1px solid #2a5a2a; }
  #btn-undo     { background: #222; color: #aaa; border: 1px solid #333; font-size: 1rem; padding: 4px 9px; }
  #btn-redo     { background: #222; color: #aaa; border: 1px solid #333; font-size: 1rem; padding: 4px 9px; }

  .diff-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: #1e1e2e;
    border: 1px solid #3a3a5a;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    font-size: 0.8rem;
    color: #99a;
    transition: background 0.15s, color 0.15s;
  }
  .diff-toggle:hover { background: #252535; }
  .diff-toggle.active { background: #1a2040; color: #88f; border-color: #4a4a8a; }
  .diff-toggle input { accent-color: #66f; cursor: pointer; }

  .meta-bar {
    padding: 0 16px 8px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    border-top: 1px solid #1e1e1e;
    flex-wrap: wrap;
  }
  .meta-field { display: flex; flex-direction: column; gap: 3px; }
  .meta-field label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.07em; color: #555; }
  .meta-field input {
    background: #181818;
    border: 1px solid #2e2e2e;
    border-radius: 3px;
    color: #ccc;
    font-size: 0.82rem;
    padding: 4px 7px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .meta-field input:focus { border-color: #4d9; }
  #input-filename { width: 200px; font-family: monospace; }
  #input-desc     { width: 380px; }
  #input-board    { width: 160px; }
  #input-version  { width: 80px; }
  #input-version::-webkit-inner-spin-button,
  #input-version::-webkit-outer-spin-button { -webkit-appearance: none; }

  .field-error {
    border-color: #e44 !important;
    background: #2a1a1a !important;
  }
  .field-error:focus { border-color: #e66 !important; }

  /* ── Config banner ── */
  #config-banner {
    display: none;
    background: #161f16;
    border-bottom: 1px solid #2a3a2a;
    padding: 8px 16px 7px;
    flex-shrink: 0;
  }
  #config-banner.visible { display: block; }
  #banner-desc { font-size: 1.15rem; font-weight: 700; color: #6e6; letter-spacing: 0.02em; }
  #banner-name { font-size: 0.8rem; color: #7a7; margin-top: 2px; font-family: monospace; }

  /* ── Build toolbar ── */
  #build-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px;
    background: #0e0e0e;
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .build-btn-compile {
    padding: 6px 18px;
    background: #1a3060;
    color: #6af;
    border: 1px solid #2a4080;
    border-radius: 4px;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .build-btn-compile:hover { background: #1e3a78; }
  .build-btn-compile:disabled { opacity: 0.35; cursor: not-allowed; }

  .build-btn-flash {
    padding: 6px 18px;
    background: #1a3a1a;
    color: #4d4;
    border: 1px solid #2a5a2a;
    border-radius: 4px;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .build-btn-flash:hover { background: #1e4a1e; }
  .build-btn-flash:disabled { opacity: 0.35; cursor: not-allowed; }

  .build-divider {
    width: 1px;
    height: 22px;
    background: #2e2e2e;
    flex-shrink: 0;
  }

  /* Port selector */
  .port-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .port-group label { font-size: 0.72rem; color: #666; white-space: nowrap; }

  #bp-port-select {
    background: #181818;
    border: 1px solid #2e2e2e;
    border-radius: 3px;
    color: #ccc;
    font-size: 0.78rem;
    padding: 4px 6px;
    outline: none;
    min-width: 160px;
    cursor: pointer;
  }
  #bp-port-select:focus { border-color: #4d9; }

  #bp-btn-refresh-ports {
    background: #222;
    color: #888;
    border: 1px solid #333;
    padding: 4px 8px;
    font-size: 0.85rem;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.3s;
  }
  #bp-btn-refresh-ports:hover { color: #ccc; }
  @keyframes spin { 
    0%, 100% { opacity: 1; } 
    50% { opacity: 0.3; } 
  }

  /* Status indicators */
  .status-group {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .bp-status-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
  }
  .bp-status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .bp-status-ok      { background: #4d4; box-shadow: 0 0 4px #4d4a; }
  .bp-status-error   { background: #e44; box-shadow: 0 0 4px #e44a; }
  .bp-status-warn    { background: #cb6; box-shadow: 0 0 4px #cb6a; }
  .bp-status-pending { background: #66f; box-shadow: 0 0 4px #66fa; animation: pulse-dot 1.2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .bp-status-text { color: #777; white-space: nowrap; }

  /* ── Empty state ── */
  #empty-state {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #444;
  }
  #empty-state.visible { display: flex; }
  #empty-state svg { color: #333; }
  #empty-state p { font-size: 0.9rem; }
  #btn-open-empty {
    padding: 10px 28px;
    background: #1a2a3a;
    color: #6af;
    border: 1px solid #2a3a5a;
    border-radius: 5px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
  #btn-open-empty:hover { opacity: 0.82; }

  /* ── Editor container ── */
  #editor-container { flex: 1; overflow: hidden; position: relative; display: none; min-height: 0; }
  #editor-container.visible { display: block; }
  #editor, #diff-editor { width: 100%; height: 100%; }
  #diff-editor { display: none; }

  #diff-labels {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
  }
  #diff-labels.visible { display: flex; }
  .diff-label {
    flex: 1;
    text-align: center;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 0;
  }
  .diff-label.orig { color: #a55; background: rgba(80,20,20,0.55); }
  .diff-label.curr { color: #4a4; background: rgba(20,60,20,0.55); }
  .diff-label.curr.pulse { animation: pulse-curr 1.8s ease-out forwards; }
  @keyframes pulse-curr {
    0%   { color: #fff; background: rgba(40,160,40,0.75); box-shadow: 0 0 12px rgba(80,255,80,0.6); }
    40%  { color: #8f8; background: rgba(20,100,20,0.65); box-shadow: 0 0 6px rgba(80,255,80,0.3); }
    100% { color: #4a4; background: rgba(20,60,20,0.55); box-shadow: none; }
  }

  /* ── Progress bar ── */
  #build-progress-wrap {
    height: 3px;
    background: #1a1a1a;
    flex-shrink: 0;
    display: none;
    position: relative;
    overflow: hidden;
  }
  #build-progress-wrap.visible { display: block; }
  #build-progress-bar {
    height: 100%;
    width: 0%;
    background: #4af;
    transition: width 0.3s ease, background 0.4s ease;
  }
  #build-progress-bar.success { background: #025192; }
  #build-progress-bar.error   { background: #e44; }
  #build-progress-bar.indeterminate {
    width: 40%;
    animation: indeterminate 1.2s ease-in-out infinite;
  }
  @keyframes indeterminate {
    0%   { left: -40%; }
    100% { left: 110%; }
  }

  /* ── Log panel ── */
  #build-log {
    flex-shrink: 0;
    background: #0d0d0d;
    border-top: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    max-height: 260px;
  }
  #bp-log-toggle {
    background: #111;
    border: none;
    border-bottom: 1px solid #222;
    color: #666;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 16px;
    cursor: pointer;
    text-align: left;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  #bp-log-toggle:hover { color: #aaa; background: #161616; }
  #bp-log-clear {
    background: none;
    border: none;
    color: #444;
    font-size: 0.7rem;
    cursor: pointer;
    padding: 0 4px;
  }
  #bp-log-clear:hover { color: #888; }

  #bp-log-body { display: none; }
  #bp-log-body.open { display: block; }
  #bp-log-content {
    font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
    font-size: 0.72rem;
    line-height: 1.5;
    padding: 8px 16px;
    height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: #888;
  }
  #bp-log-content::-webkit-scrollbar { width: 6px; }
  #bp-log-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .log-error     { color: #e66; }
  .log-highlight { color: #4d4; font-weight: 600; }
  .log-progress  { color: #4af; }

  /* ── Status bar ── */
  .status-bar {
    background: #111;
    border-top: 1px solid #2e2e2e;
    padding: 3px 16px;
    font-size: 0.72rem;
    color: #555;
    display: flex;
    gap: 20px;
    flex-shrink: 0;
    align-items: center;
  }
  .status-bar .hl { color: #4d9; }
  #stat-dirty { color: #cb6; display: none; }
  #stat-dirty.visible { display: inline; }
  #stat-diff-info { color: #88f; display: none; }
  #stat-diff-info.visible { display: inline; }
  #stat-filepath {
    color: #444; font-family: monospace; font-size: 0.68rem;
    max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Knight Rider animation  ── */
  @keyframes knightrider {
  0%   { left: 0%;   width: 30%; }
  50%  { left: 70%;  width: 30%; }
  100% { left: 0%;   width: 30%; }
  }
  @keyframes flashprogress {
    0%   { width: 15%; }
    85%  { width: 85%; }
    100% { width: 85%; }
  }
  .bm-bar-knightrider {
    animation: knightrider 1.4s ease-in-out infinite;
    background: #025192 !important;
    box-shadow: 0 0 12px rgba(2,81,146,0.8), 0 0 24px rgba(2,81,146,0.4);
  }
  .bm-bar-flash {
    animation: flashprogress 30s ease-out forwards;
    width: 15%;
    background: #025192 !important;
    box-shadow: 0 0 8px rgba(2,81,146,0.6);
  }
  .bm-bar-success { background: #025192 !important; box-shadow: 0 0 8px rgba(2,81,146,0.6) !important; animation: none !important; width: 100% !important; }
  .bm-bar-error   { background: #e44 !important; box-shadow: 0 0 8px rgba(220,60,60,0.5) !important; animation: none !important; width: 100% !important; }

  /* ── Unsaved modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #222;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 24px 28px;
    max-width: 380px;
    width: 90%;
  }
  .modal h2 { font-size: 0.95rem; color: #eee; margin-bottom: 8px; }
  .modal p  { font-size: 0.82rem; color: #888; margin-bottom: 20px; line-height: 1.5; }
  .modal-btns { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-btn-cancel  { background: #2a2a2a; color: #aaa; border: 1px solid #3a3a3a; }
  .modal-btn-discard { background: #3a1a1a; color: #e55; border: 1px solid #5a2a2a; }
  .modal-btn-save    { background: #1a3a1a; color: #4d4; border: 1px solid #2a5a2a; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-top">
    <div class="title-group">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      <h1>JMT Studio</h1>
    </div>
    <div class="btn-group">
      <button id="btn-undo" title="Undo (Ctrl+Z)">&#8634;</button>
      <button id="btn-redo" title="Redo (Ctrl+Y)">&#8635;</button>
      <label class="diff-toggle" id="diff-toggle-label">
        <input type="checkbox" id="chk-diff" />
        &#9776; Show Changes
      </label>
      <button id="btn-open">&#8593; Open</button>
      <button id="btn-close">&#10005; Close</button>
      <button id="btn-save"     style="display:none">&#8595; Save</button>
      <button id="btn-saveas"   style="display:none">&#8595; Save As</button>
      <button id="btn-download" style="display:none">&#8595; Download</button>
    </div>
  </div>
  <div class="meta-bar">
    <div class="meta-field">
      <label>File Name</label>
      <input type="text" id="input-filename" placeholder="Auto-set on save" spellcheck="false" readonly />
    </div>
    <div class="meta-field">
      <label>Description</label>
      <input type="text" id="input-desc" placeholder="e.g. Graflex v2 — Proffie 2.2, Fett263, NeoPixel 144" spellcheck="false" />
    </div>
    <div class="meta-field">
      <label>Board</label>
      <input type="text" id="input-board" placeholder="Auto-detected on port scan" spellcheck="false" readonly />
    </div>
    <div class="meta-field">
      <label>OS Version</label>
      <input type="number" id="input-version" placeholder="8.1" min="1" step="0.1" spellcheck="false" style="width:80px;" />
    </div>
  </div>
</header>

<!-- ── Config banner ── -->
<div id="config-banner">
  <div id="banner-desc"></div>
  <div id="banner-name"></div>
</div>

<!-- ── Build toolbar ── -->
<div id="build-toolbar">
  <button class="build-btn-compile" id="bp-btn-compile">⚙ Compile</button>
  <button class="build-btn-flash"   id="bp-btn-flash"   disabled>⚡ Flash</button>

  <div class="build-divider"></div>

  <div class="port-group">
    <label>Port</label>
    <select id="bp-port-select"><option value="">Scanning...</option></select>
    <label style="margin-left:8px">Board</label>
    <select id="bp-board-select"><option value="">—</option></select>
    <button id="bp-btn-refresh-ports" title="Refresh ports">↺</button>
    <label style="margin-left:8px">USB</label>
    <select id="bp-usb-select" style="background:#181818;border:1px solid #2e2e2e;border-radius:3px;color:#ccc;font-size:0.78rem;padding:4px 6px;outline:none;cursor:pointer;">
      <option value="cdc">Serial</option>
      <option value="cdc_msc">Serial + Mass Storage</option>
      <option value="cdc_hid">Serial + Keyboard + Mouse</option>
      <option value="cdc_msc_hid">Serial + Mass Storage + Keyboard + Mouse</option>
      <option value="cdc_dap">Serial + CMSIS-DAP</option>
      <option value="cdc_msc_dap">Serial + Mass Storage + CMSIS-DAP</option>
      <option value="cdc_webusb" selected>Serial + WebUSB</option>
      <option value="cdc_msc_webusb">Serial + Mass Storage + WebUSB</option>
      <option value="none">No USB</option>
    </select>
  </div>

  <div class="build-divider"></div>

  <!-- Status indicators -->
  <div class="status-group">
    <div class="bp-status-item">
      <div class="bp-status-dot bp-status-pending" id="bp-status-toolchain-dot"></div>
      <span class="bp-status-text" id="bp-status-toolchain-text">Toolchain</span>
    </div>
    <div class="bp-status-item">
      <div class="bp-status-dot bp-status-pending" id="bp-status-port-dot"></div>
      <span class="bp-status-text" id="bp-status-port-text">Port</span>
    </div>
    <div class="bp-status-item">
      <div class="bp-status-dot" id="bp-status-compile-dot"></div>
      <span class="bp-status-text" id="bp-status-compile-text">Not compiled</span>
    </div>
    <div class="bp-status-item">
      <div class="bp-status-dot" id="bp-status-flash-dot"></div>
      <span class="bp-status-text" id="bp-status-flash-text">Not flashed</span>
    </div>
  </div>
</div>

<!-- ── Empty state ── -->
<div id="empty-state">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
  </svg>
  <p>No config file open</p>
  <button id="btn-open-empty">&#8593; Open Config File</button>
</div>

<!-- ── Editor ── -->
<div id="editor-container">
  <div id="editor"></div>
  <div id="diff-editor"></div>
  <div id="diff-labels">
    <div class="diff-label orig">Original (baseline)</div>
    <div class="diff-label curr">Current</div>
  </div>
</div>

<!-- ── Log panel ── -->
<div id="build-log">
  <button id="bp-log-toggle">
    <span>▼ Build Output</span>
    <button id="bp-log-clear">✕ clear</button>
  </button>
  <div id="bp-log-body">
    <div id="bp-log-content"></div>
  </div>
</div>

<!-- ── Status bar ── -->
<div class="status-bar">
  <span>Ln <span id="stat-ln">1</span>, Col <span id="stat-col">1</span></span>
  <span id="stat-sel"></span>
  <span class="hl">C++</span>
  <span id="stat-board"></span>
  <span id="stat-version"></span>
  <span id="stat-dirty">&#9679; unsaved</span>
  <span id="stat-diff-info">&#9776; diff view</span>
  <span id="stat-filepath"></span>
</div>

<!-- ── Unsaved modal ── -->
<div class="modal-overlay" id="modal-unsaved">
  <div class="modal">
    <h2>Unsaved Changes</h2>
    <p id="modal-unsaved-msg">You have unsaved changes. Save before continuing?</p>
    <div class="modal-btns">
      <button class="modal-btn-cancel"  id="modal-unsaved-cancel">Cancel</button>
      <button class="modal-btn-discard" id="modal-unsaved-discard">Discard</button>
      <button class="modal-btn-save"    id="modal-unsaved-save">Save</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".h,.txt" style="display:none" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
// ── Environment ────────────────────────────────────────
const isElectron = !!window.electronAPI;

// ── State ──────────────────────────────────────────────
let editor, diffEditorInstance;
let snapshot        = '';
let isDirty         = false;
let diffVisible     = false;
let currentFilePath = null;
let fileIsOpen      = false;

// ── Editor content accessor for buildPanel ─────────────
window.getEditorContent = () => {
  if (diffVisible && diffEditorInstance)
    return diffEditorInstance.getModifiedEditor().getValue();
  return editor ? editor.getValue() : '';
};

// ── Empty state ────────────────────────────────────────
function setFileOpen(open) {
  fileIsOpen = open;
  document.getElementById('empty-state').classList.toggle('visible', !open);
  document.getElementById('editor-container').classList.toggle('visible', open);
  if (!open) document.getElementById('config-banner').classList.remove('visible');
  else updateBanner();
}

// ── Unsaved modal ──────────────────────────────────────
function promptUnsaved(msg) {
  return new Promise(resolve => {
    document.getElementById('modal-unsaved-msg').textContent = msg || 'You have unsaved changes.';
    const overlay = document.getElementById('modal-unsaved');
    overlay.classList.add('active');
    const cleanup = r => { overlay.classList.remove('active'); resolve(r); };
    document.getElementById('modal-unsaved-cancel').onclick  = () => cleanup('cancel');
    document.getElementById('modal-unsaved-discard').onclick = () => cleanup('discard');
    document.getElementById('modal-unsaved-save').onclick    = () => cleanup('save');
  });
}

// ── Dirty ──────────────────────────────────────────────
function setDirty(v) {
  isDirty = v;
  document.getElementById('stat-dirty').classList.toggle('visible', v);
  updateWindowTitle();
}

// ── Window title ───────────────────────────────────────
function updateWindowTitle() {
  if (!isElectron) return;
  const name = currentFilePath
    ? currentFilePath.split(/[\\/]/).pop()
    : (document.getElementById('input-filename').value.trim() || 'my_config') + '.h';
  window.electronAPI.setTitle(`${name}${isDirty ? ' ●' : ''} — JMT Studio`);
}

// ── File path ──────────────────────────────────────────
function setFilePath(p) {
  currentFilePath = p;
  document.getElementById('stat-filepath').textContent = p || '';
  updateWindowTitle();
}

// ── Banner ─────────────────────────────────────────────
function updateBanner() {
  const name = document.getElementById('input-filename').value.trim();
  const desc = document.getElementById('input-desc').value.trim();
  const banner = document.getElementById('config-banner');
  if (fileIsOpen && (name || desc)) {
    document.getElementById('banner-desc').textContent = desc || (name + '.h');
    document.getElementById('banner-name').textContent = '';
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
  updateWindowTitle();
}
document.getElementById('input-filename').addEventListener('input', updateBanner);
document.getElementById('input-desc').addEventListener('input', updateBanner);

// ── Status meta ────────────────────────────────────────
function updateStatusMeta() {
  const board   = document.getElementById('input-board').value.trim();
  const version = document.getElementById('input-version').value.trim();
  document.getElementById('stat-board').textContent   = board || '';
  document.getElementById('stat-version').textContent = version ? 'ProffieOS ' + version : '';
}
document.getElementById('input-board').addEventListener('input', updateStatusMeta);
document.getElementById('input-version').addEventListener('input', updateStatusMeta);
document.getElementById('input-version').addEventListener('input', validateFields);

// ── Metadata ───────────────────────────────────────────
const META_NAME = '// @jmt:name', META_DESC = '// @jmt:desc',
      META_BOARD = '// @jmt:board', META_VERSION = '// @jmt:version';

function injectMetadata(content) {
  const name = document.getElementById('input-filename').value.trim();
  const desc = document.getElementById('input-desc').value.trim();
  const board = document.getElementById('input-board').value.trim();
  const version = document.getElementById('input-version').value.trim();
  const stripped = content.replace(/^\/\/ @jmt:\S+.*\n?/gm, '');
  const lines = [];
  if (name)    lines.push(`${META_NAME}    ${name}`);
  if (desc)    lines.push(`${META_DESC}    ${desc}`);
  if (board)   lines.push(`${META_BOARD}   ${board}`);
  if (version) lines.push(`${META_VERSION} ${version}`);
  return lines.length ? lines.join('\n') + '\n' + stripped : stripped;
}

function extractMetadata(content) {
  const m = (re) => { const r = content.match(re); return r ? r[1].trim() : null; };
  return {
    name:    m(/^\/\/ @jmt:name\s+(.+)$/m),
    desc:    m(/^\/\/ @jmt:desc\s+(.+)$/m),
    board:   m(/^\/\/ @jmt:board\s+(.+)$/m),
    version: m(/^\/\/ @jmt:version\s+(.+)$/m),
    clean:   content.replace(/^\/\/ @jmt:\S+.*\n?/gm, '')
  };
}

// ── Load content ───────────────────────────────────────
function loadContent(rawContent, filePath) {
  const { name, desc, board, version, clean } = extractMetadata(rawContent);
  const base = filePath ? filePath.split(/[\\/]/).pop().replace(/\.[^.]+$/, '') : null;
  document.getElementById('input-filename').value = name    || base || 'my_config';
  document.getElementById('input-desc').value     = desc    || '';
  document.getElementById('input-board').value    = board   || '';
  const versionNum = parseFloat(version || '');
  document.getElementById('input-version').value  = !isNaN(versionNum) ? versionNum : '';
  if (version && isNaN(parseFloat(version))) {
    document.getElementById('input-version').classList.add('field-error');
  } else {
    document.getElementById('input-version').classList.remove('field-error');
  }
  closeDiff();
  editor.setValue(clean);
  takeSnapshot(clean);
  setFilePath(filePath || null);
  setFileOpen(true);
  updateBanner();
  updateStatusMeta();
  setDirty(false);
  editor.focus();
}

function clearMeta() {
  ['input-filename','input-desc','input-board','input-version']
    .forEach(id => document.getElementById(id).value = '');
  updateBanner();
  updateStatusMeta();
}

function validateFields() {
  let valid = true;
  const versionEl = document.getElementById('input-version');
  const val = versionEl.value.trim();
  if (val !== '' && isNaN(parseFloat(val))) {
    versionEl.classList.add('field-error');
    valid = false;
  } else {
    versionEl.classList.remove('field-error');
  }
  return valid;
}
window.validateFields = validateFields;

// ── Snapshot ───────────────────────────────────────────
function takeSnapshot(content) {
  snapshot = content ?? editor.getValue();
  if (diffVisible) refreshDiff();
}

// ── Diff ───────────────────────────────────────────────
function closeDiff() {
  diffVisible = false;
  document.getElementById('chk-diff').checked = false;
  document.getElementById('editor').style.display      = 'block';
  document.getElementById('diff-editor').style.display = 'none';
  document.getElementById('diff-labels').classList.remove('visible');
  document.getElementById('stat-diff-info').classList.remove('visible');
  document.getElementById('diff-toggle-label').classList.remove('active');
  if (diffEditorInstance) editor.setValue(diffEditorInstance.getModifiedEditor().getValue());
  editor.focus();
}

function showDiff(visible) {
  diffVisible = visible;
  if (visible) {
    document.getElementById('editor').style.display      = 'none';
    document.getElementById('diff-editor').style.display = 'block';
    document.getElementById('diff-labels').classList.add('visible');
    document.getElementById('stat-diff-info').classList.add('visible');
    document.getElementById('diff-toggle-label').classList.add('active');
    refreshDiff();
    const lbl = document.querySelector('.diff-label.curr');
    lbl.classList.remove('pulse');
    void lbl.offsetWidth;
    lbl.classList.add('pulse');
  } else {
    closeDiff();
  }
}

function refreshDiff() {
  if (!diffEditorInstance) return;
  const orig = monaco.editor.createModel(snapshot, 'cpp');
  const curr = monaco.editor.createModel(editor.getValue(), 'cpp');
  diffEditorInstance.setModel({ original: orig, modified: curr });
  diffEditorInstance.getModifiedEditor().onDidChangeModelContent(() => {
    if (diffVisible) setDirty(true);
  });
}

document.getElementById('chk-diff').addEventListener('change', e => showDiff(e.target.checked));

// ── Save / Download ────────────────────────────────────
async function doSave() {
  const content = injectMetadata(window.getEditorContent());
  if (isElectron) {
    if (currentFilePath) {
      const res = await window.electronAPI.saveFile(currentFilePath, content);
      if (res.ok) setDirty(false);
      else alert('Save failed: ' + res.error);
    } else { await doSaveAs(); }
  } else { doDownload(); }
}

window.doSave = doSave;

async function doSaveAs() {
  const name    = document.getElementById('input-filename').value.trim() || 'my_config';
  const content = injectMetadata(window.getEditorContent());
  const res     = await window.electronAPI.saveAs(name + '.h', content);
  if (res.ok) {
    setFilePath(res.filePath);
    // Update filename field from the actual saved filename
    const base = res.filePath.split(/[\\/]/).pop().replace(/\.h$/i, '');
    document.getElementById('input-filename').value = base;
    updateBanner();
    setDirty(false);
  }
}

function doDownload() {
  const raw  = document.getElementById('input-filename').value.trim() || 'my_config';
  const name = raw.replace(/\.h$/i,'') + '.h';
  const blob = new Blob([injectMetadata(window.getEditorContent())], { type: 'text/x-c++src' });
  const url  = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), { href: url, download: name }).click();
  URL.revokeObjectURL(url);
  setDirty(false);
}

function setFilePath(p) {
  currentFilePath = p;
  window._currentFilePath = p;
  document.getElementById('stat-filepath').textContent = p || '';
  updateWindowTitle();
}

document.getElementById('btn-save')    ?.addEventListener('click', doSave);
document.getElementById('btn-saveas')  ?.addEventListener('click', doSaveAs);
document.getElementById('btn-download')?.addEventListener('click', doDownload);

// ── Guard unsaved ──────────────────────────────────────
async function guardUnsaved(msg) {
  if (!isDirty) return true;
  const choice = await promptUnsaved(msg);
  if (choice === 'cancel')  return false;
  if (choice === 'save')    { await doSave(); return true; }
  return true;
}

// ── Open ───────────────────────────────────────────────
async function doOpen() {
  if (!await guardUnsaved('Save current file before opening another?')) return;
  if (isElectron) {
    const res = await window.electronAPI.openFile();
    if (res) loadContent(res.content, res.filePath);
  } else {
    document.getElementById('file-input').click();
  }
}

document.getElementById('btn-open').addEventListener('click', doOpen);
document.getElementById('btn-open-empty').addEventListener('click', doOpen);
document.getElementById('file-input').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  this.value = '';
  const reader = new FileReader();
  reader.onload = e => loadContent(e.target.result, file.name);
  reader.readAsText(file);
});

// ── Close ──────────────────────────────────────────────
document.getElementById('btn-close').addEventListener('click', async () => {
  if (!fileIsOpen) return;
  if (!await guardUnsaved('Save before closing?')) return;
  closeDiff();
  editor.setValue('');
  clearMeta();
  setFilePath(null);
  setFileOpen(false);
  setDirty(false);
  if (isElectron) {
    await window.electronAPI.clearLastFile();
    window.electronAPI.setTitle('JMT Studio');
  }
});

// ── Undo / Redo ────────────────────────────────────────
document.getElementById('btn-undo').addEventListener('click', () => {
  if (diffVisible) { diffEditorInstance.getModifiedEditor().trigger('toolbar','undo',null); diffEditorInstance.getModifiedEditor().focus(); }
  else { editor?.trigger('toolbar','undo',null); editor?.focus(); }
});
document.getElementById('btn-redo').addEventListener('click', () => {
  if (diffVisible) { diffEditorInstance.getModifiedEditor().trigger('toolbar','redo',null); diffEditorInstance.getModifiedEditor().focus(); }
  else { editor?.trigger('toolbar','redo',null); editor?.focus(); }
});

// ── Save buttons visibility ────────────────────────────
document.getElementById('btn-save').style.display     = isElectron ? '' : 'none';
document.getElementById('btn-saveas').style.display   = isElectron ? '' : 'none';
document.getElementById('btn-download').style.display = isElectron ? 'none' : '';

// ── Monaco + buildPanel init ───────────────────────────
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {

  editor = monaco.editor.create(document.getElementById('editor'), {
    value: '',
    language: 'cpp',
    theme: 'vs-dark',
    fontSize: 13,
    fontFamily: "'Cascadia Code', 'Fira Code', Consolas, monospace",
    fontLigatures: true,
    lineNumbers: 'on',
    minimap: { enabled: true },
    scrollBeyondLastLine: false,
    automaticLayout: true,
    tabSize: 2,
    insertSpaces: true,
    wordWrap: 'off',
    folding: true,
    foldingStrategy: 'indentation',
    showFoldingControls: 'always',
    autoIndent: 'advanced',
    formatOnPaste: true,
    renderWhitespace: 'selection',
    bracketPairColorization: { enabled: true },
    guides: { bracketPairs: true },
    scrollbar: { verticalScrollbarSize: 8, horizontalScrollbarSize: 8 }
  });

  diffEditorInstance = monaco.editor.createDiffEditor(document.getElementById('diff-editor'), {
    theme: 'vs-dark',
    fontSize: 13,
    fontFamily: "'Cascadia Code', 'Fira Code', Consolas, monospace",
    fontLigatures: true,
    lineNumbers: 'on',
    automaticLayout: true,
    readOnly: false,
    renderSideBySide: true,
    ignoreTrimWhitespace: false,
    renderIndicators: true,
    scrollbar: { verticalScrollbarSize: 8, horizontalScrollbarSize: 8 }
  });

  editor.onDidChangeModelContent(() => {
    if (fileIsOpen) {
      setDirty(true);
      if (window.onEditorContentChanged) window.onEditorContentChanged();
    }
  });

  editor.onDidChangeCursorPosition(e => {
    document.getElementById('stat-ln').textContent  = e.position.lineNumber;
    document.getElementById('stat-col').textContent = e.position.column;
  });

  editor.onDidChangeCursorSelection(() => {
    const sel = editor.getSelection(), model = editor.getModel();
    if (sel && !sel.isEmpty()) {
      const chars = model.getValueInRange(sel).length;
      const lines = sel.endLineNumber - sel.startLineNumber + 1;
      document.getElementById('stat-sel').textContent =
        `${chars} chars${lines > 1 ? `, ${lines} lines` : ''} selected`;
    } else {
      document.getElementById('stat-sel').textContent = ''; }
  });

  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
    () => fileIsOpen && (isElectron ? doSave() : doDownload()));

  // ── Startup ──
  (async () => {
    if (isElectron) {
      const lastPath = await window.electronAPI.getLastFile();
      if (lastPath) {
        const res = await window.electronAPI.readFile(lastPath);
        if (res) { loadContent(res.content, res.filePath); }
        else     { setFileOpen(false); }
      } else { setFileOpen(false); }
    } else { setFileOpen(false); }
  })();

  // ── App close handler ──
  if (isElectron) {
    window.electronAPI.onAppClosing(async () => {
      if (window._isFlashing) {
        alert('Cannot close while flashing. Wait for flash to complete.');
        return;
      }
      if (isDirty) {
        const choice = await promptUnsaved('Save before closing JMT Studio?');
        if (choice === 'cancel') return;
        if (choice === 'save') { await doSave(); }
      }
      window.electronAPI.doClose();
    });
  }

  // ── Load buildPanel ──
  if (isElectron) {
    const script = document.createElement('script');
    script.src = 'buildPanel.js';
    script.onload = () => window.initBuildPanel();
    document.body.appendChild(script);

    // Wire progress bar parsing into build log
    window.electronAPI.onBuildLog(({ line, isError }) => {
      const pct = line.match(/(\d+)%/);
      if (pct) {
        const val = parseInt(pct[1]);
        // Update modal bar directly
        const modalBar = document.getElementById('bm-bar');
        if (modalBar) {
          modalBar.classList.remove('bm-bar-knightrider', 'bm-bar-flash', 'bm-bar-success', 'bm-bar-error');
          modalBar.style.animation = 'none';
          modalBar.style.position  = 'absolute';
          modalBar.style.left      = '0';
          modalBar.style.width     = val + '%';
        }
      }
    });
  }
});
</script>

<!-- ── Build modal ── -->
<div id="build-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#111;border:1px solid #025192;border-radius:8px;padding:28px 32px;width:640px;max-width:92vw;box-shadow:0 0 40px rgba(2,81,146,0.3);">
    <div id="bm-title" style="font-size:1.1rem;font-weight:700;color:#eee;margin-bottom:18px;letter-spacing:0.04em;">Compiling...</div>

    <!-- Knight Rider / progress bar -->
    <div id="bm-bar-track" style="height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-bottom:18px;position:relative;">
      <div id="bm-bar" style="height:100%;width:30%;border-radius:3px;background:#025192;position:absolute;left:0;transition:background 0.4s;"></div>
    </div>

    <!-- Log output -->
    <div id="bm-log" style="font-family:'Cascadia Code',Consolas,monospace;font-size:0.72rem;line-height:1.5;color:#888;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:4px;padding:10px 12px;height:220px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-bottom:18px;"></div>

    <!-- Status / close -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid #1e1e1e;">
      <div id="bm-status" style="font-size:0.82rem;color:#666;"></div>
      <button id="bm-close" style="display:none;padding:6px 20px;background:#1a3a1a;color:#4d4;border:1px solid #2a5a2a;border-radius:4px;font-size:0.82rem;font-weight:600;cursor:pointer;">Close</button>
    </div>

    <!-- Elapsed time -->
    <div style="display:flex;gap:20px;justify-content:flex-end;margin-top:10px;font-family:monospace;font-size:0.72rem;color:#555;">
      <span id="bm-timer-compile" style="display:none;">Compile Time: <span id="bm-timer-compile-val">0:00</span></span>
      <span id="bm-timer-flash" style="display:none;">Flash Time: <span id="bm-timer-flash-val">0:00</span></span>
    </div>
  </div>
</div>

</body>
</html>
