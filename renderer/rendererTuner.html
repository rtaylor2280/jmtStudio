<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<title>Renderer Tuner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { accent-color: #025192; }
  body { background: #0a0a0a; color: #ccc; font-family: monospace; font-size: 13px; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; min-height: 100vh; }
  h1 { color: #aaa; font-size: 15px; letter-spacing: 2px; text-transform: uppercase; }
  #canvasWrap { width: 900px; background: #000; border-radius: 4px; overflow: visible; }
  canvas { display: block; }
  #controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px 20px; width: 900px; background: #111; border: 1px solid #222; border-radius: 6px; padding: 14px 18px; }
  .col-header { color: #666; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 4px; margin-bottom: 2px; }
  .ctrl { display: flex; flex-direction: column; gap: 3px; }
  .ctrl label { color: #888; font-size: 11px; display: flex; justify-content: space-between; }
  .ctrl label span { color: #aaa; }
  input[type=range] { width: 100%; accent-color: #5af; height: 3px; cursor: pointer; }
  select { background: #1a1a1a; color: #ccc; border: 1px solid #333; border-radius: 3px; padding: 4px 6px; font-family: monospace; font-size: 12px; width: 100%; cursor: pointer; }
  #fps { position: fixed; top: 8px; right: 12px; color: #444; font-size: 11px; }
  #footer { display: flex; align-items: center; gap: 10px; width: 900px; justify-content: flex-end; }
  #status { font-size: 11px; color: #555; margin-right: auto; }
  #status.ok  { color: #5adb8a; }
  #status.err { color: #e06c6c; }
  .btn { background: #1a1a1a; color: #aaa; border: 1px solid #333; border-radius: 3px; padding: 5px 16px; font-family: monospace; font-size: 12px; cursor: pointer; }
  .btn:hover { background: #222; border-color: #444; }
  .btn-save { background: #025192; color: #fff; border-color: #1a7fd4; }
  .btn-save:hover { background: #1a7fd4; }
</style>
</head>
<body>
<h1>Renderer Tuner</h1>
<div id="canvasWrap">
  <canvas id="c" width="900" height="200"></canvas>
  <div class="col-header" style="grid-column:span 4; margin-top:6px;">Hilt</div>
  <div class="ctrl"><label>Hilt Length (LEDs) <span id="v-hiltLedLen">35</span></label><input type="range" id="hiltLedLen" min="5" max="80" step="1" value="35"></div>
  <div class="ctrl"><label>Hilt Width <span id="v-hiltWidth">0.23</span></label><input type="range" id="hiltWidth" min="0.05" max="0.6" step="0.01" value="0.23"></div>
  <div class="ctrl"><label>Hilt Gap (px) <span id="v-hiltGap">0</span></label><input type="range" id="hiltGap" min="-10" max="40" step="1" value="0"></div>
</div>

<div id="controls">
  <div class="col-header">LED / Field</div>
  <div class="col-header">Blade Shape</div>
  <div class="col-header">Bloom / Glow</div>
  <div class="col-header">Color / Pattern</div>
  <div class="col-header">Calibration</div>

  <div class="ctrl"><label>Blend Radius <span id="v-blendRadius">8</span></label><input type="range" id="blendRadius" min="1" max="60" value="8"></div>
  <div class="ctrl"><label>Core Width <span id="v-coreWidth">0.19</span></label><input type="range" id="coreWidth" min="0.02" max="0.9" step="0.01" value="0.19"></div>
  <div class="ctrl"><label>Brightness <span id="v-brightness">0.90</span></label><input type="range" id="brightness" min="0.1" max="3" step="0.05" value="0.90"></div>
  <div class="ctrl"><label>LED Count <span id="v-ledCount">144</span></label><input type="range" id="ledCount" min="0" max="144" step="1" value="144"></div>
  <div class="ctrl"><label>Red Gain <span id="v-gainR">1.00</span></label><input type="range" id="gainR" min="0.5" max="2" step="0.01" value="1.00"></div>

  <div class="ctrl"><label>Falloff Strength <span id="v-falloff">0.8</span></label><input type="range" id="falloff" min="0.5" max="5" step="0.1" value="0.8"></div>
  <div class="ctrl"><label>Edge Softness <span id="v-edgeSoft">2.1</span></label><input type="range" id="edgeSoft" min="0.5" max="8" step="0.1" value="2.1"></div>
  <div class="ctrl"><label>Bloom Radius <span id="v-bloomRadius">73</span></label><input type="range" id="bloomRadius" min="4" max="120" value="73"></div>
  <div class="ctrl"><label>Saturation <span id="v-saturation">2.35</span></label><input type="range" id="saturation" min="0" max="3" step="0.05" value="2.35"></div>
  <div class="ctrl"><label>Green Gain <span id="v-gainG">1.00</span></label><input type="range" id="gainG" min="0.5" max="2" step="0.01" value="1.00"></div>

  <div class="ctrl"><label>Bloom Intensity <span id="v-bloomIntensity">1.05</span></label><input type="range" id="bloomIntensity" min="0" max="2" step="0.05" value="1.05"></div>
  <div class="ctrl"><label>Core Whiten <span id="v-coreWhiten">0.35</span></label><input type="range" id="coreWhiten" min="0" max="1" step="0.05" value="0.35"></div>
  <div class="ctrl"><label>Bloom Sensitivity <span id="v-bloomSens">0.80</span></label><input type="range" id="bloomSens" min="0.1" max="2" step="0.05" value="0.80"></div>
  <div class="ctrl"><label>Flicker Speed <span id="v-flickerSpeed">1.0</span></label><input type="range" id="flickerSpeed" min="0.1" max="5" step="0.1" value="1.0"></div>
  <div class="ctrl"><label>Blue Gain <span id="v-gainB">1.00</span></label><input type="range" id="gainB" min="0.5" max="2" step="0.01" value="1.00"></div>

  <div class="ctrl"><label>Tip Falloff <span id="v-tipFalloff">0.10</span></label><input type="range" id="tipFalloff" min="0" max="4" step="0.05" value="0.10"></div>
  <div class="ctrl"><label>Hilt Curve <span id="v-hiltCurve">0.90</span></label><input type="range" id="hiltCurve" min="0" max="3" step="0.05" value="0.90"></div>
  <div class="ctrl"><label>Flicker Depth <span id="v-flickerDepth">0.20</span></label><input type="range" id="flickerDepth" min="0" max="1" step="0.05" value="0.20"></div>
  <div class="ctrl"><label>Pattern</label><select id="pattern">
    <option value="solid_red">Solid — Red</option>
    <option value="solid_blue" selected>Solid — Blue</option>
    <option value="solid_green">Solid — Green</option>
    <option value="solid_white">Solid — White</option>
    <option value="gradient_rb">Gradient — Red→Blue</option>
    <option value="gradient_gb">Gradient — Green→Blue</option>
    <option value="gradient_fire">Gradient — Fire</option>
    <option value="alternating">Alternating Colors</option>
    <option value="unstable">Unstable / Flicker</option>
    <option value="pulse">Pulse Wave</option>
    <option value="rainbow">Rainbow</option>
  </select></div>
  <div class="ctrl"><label>Hilt Crescent <span id="v-hiltCrescent">0.55</span></label><input type="range" id="hiltCrescent" min="0" max="2" step="0.05" value="0.55"></div>
  <div class="ctrl"><label>Gamma <span id="v-gamma">1.00</span></label><input type="range" id="gamma" min="0.5" max="2.5" step="0.05" value="1.00"></div>
</div>

<div id="footer">
  <span id="status"></span>
  <button class="btn" id="btn-reset">Reset to Defaults</button>
  <button class="btn" id="btn-cancel">Cancel</button>
  <button class="btn btn-save" id="btn-save">Save to File</button>
</div>

<div id="fps">-- fps</div>

<script>
"use strict";

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── Baked constants ───────────────────────────────────────────────────────────
const MARGIN          = 40;
const MAX_BLADE_W     = W - MARGIN * 2;
const PX_PER_LED      = MAX_BLADE_W / 144;
const TIP_CAP_RADIUS  = 0.20;
const HILT_CAP_RADIUS = 0.05;
const CORE_WHITEN_FADE= 0.05;
const HILT_PX         = 35 * PX_PER_LED;
const RIGHT_MARGIN    = 20;

const FULL_CENTER_X = (W - RIGHT_MARGIN) - (144 * PX_PER_LED + HILT_PX) / 2;

// ─── Parameters ───────────────────────────────────────────────────────────────
const DEFAULTS = {
  blendRadius:8, falloff:0.8, brightness:0.90, ledCount:144,
  coreWidth:0.19, edgeSoft:2.1, tipFalloff:0.10, coreWhiten:0.35,
  bloomIntensity:1.05, bloomRadius:73, bloomSens:0.80, saturation:2.35,
  pattern:'solid_blue', flickerSpeed:1.0, flickerDepth:0.20,
  hiltCurve:0.90, hiltLedLen:35, hiltWidth:0.23, hiltGap:0,
  gainR:1.0, gainG:1.0, gainB:1.0, gamma:1.0,
  hiltCrescent:0.55,
};
const P = Object.assign({}, DEFAULTS);

// ─── Slider wiring ────────────────────────────────────────────────────────────
function syncSliderDisplay(id, val) {
  const el = document.getElementById(id);
  const vEl = document.getElementById('v-' + id);
  if (el) el.value = val;
  if (vEl) {
    const step = el ? parseFloat(el.step || 1) : 1;
    vEl.textContent = step < 1
      ? parseFloat(val).toFixed((step.toString().split('.')[1] || '').length)
      : String(Math.round(val));
  }
}

document.querySelectorAll('input[type=range], select').forEach(el => {
  el.addEventListener('input', () => {
    P[el.id] = el.type === 'range' ? parseFloat(el.value) : el.value;
    if (el.type === 'range') {
      const v = document.getElementById('v-' + el.id);
      if (v) v.textContent = parseFloat(el.value).toFixed(
        el.step && parseFloat(el.step) < 1 ? (el.step.toString().split('.')[1]||'').length : 0
      );
    }
    if (el.id === 'pattern') initFlickerSeeds();
    notifyParent();
  });
});

// ─── LED generation ───────────────────────────────────────────────────────────
let leds = [];
let flickerSeeds = [];
function initFlickerSeeds() {
  flickerSeeds = Array.from({length:300}, () => Math.random() * Math.PI * 2);
}
initFlickerSeeds();

function ledNoise(i, t, speed) {
  const s = flickerSeeds[i] || 0;
  return 0.5 + 0.5*(
    0.5*Math.sin(t*speed*3.7+s) +
    0.3*Math.sin(t*speed*7.1+s*1.3) +
    0.2*Math.sin(t*speed*13.3+s*0.7)
  );
}

function hsvToRgb(h, s, v) {
  const i=Math.floor(h*6), f=h*6-i;
  const p=v*(1-s), q=v*(1-f*s), t2=v*(1-(1-f)*s);
  switch(i%6){case 0:return[v,t2,p];case 1:return[q,v,p];case 2:return[p,v,t2];case 3:return[p,q,v];case 4:return[t2,p,v];case 5:return[v,p,q];}
  return [0,0,0];
}

function generateLEDs(t) {
  const n = Math.round(P.ledCount);
  if (n === 0) { leds = []; return; }
  if (leds.length !== n) leds = Array.from({length:n}, () => [0,0,0]);
  const pat=P.pattern, fd=P.flickerDepth, fs=P.flickerSpeed;
  for (let i = 0; i < n; i++) {
    const pos = i / Math.max(1, n-1);
    let r=0, g=0, b=0;
    switch(pat) {
      case 'solid_red':     r=1;    g=0.05; b=0.02; break;
      case 'solid_blue':    r=0.35; g=0.45; b=1;    break;
      case 'solid_green':   r=0.02; g=1;    b=0.05; break;
      case 'solid_white':   r=1;    g=1;    b=1;    break;
      case 'gradient_rb':   r=1-pos; g=0.05; b=pos; break;
      case 'gradient_gb':   r=0.05; g=1-pos; b=pos; break;
      case 'gradient_fire': r=1; g=Math.max(0,1-pos*1.6); b=Math.max(0,0.3-pos); break;
      case 'alternating': {
        const seg=Math.floor(pos*12);
        if(seg%2===0){r=1;g=0.1;b=0.1;}else{r=0.1;g=0.1;b=1;}
        break;
      }
      case 'unstable': {
        const noise=ledNoise(i,t,fs), bright=1-fd+fd*noise;
        r=bright*0.7; g=bright*0.05; b=bright;
        const spark=ledNoise(i+144,t,fs*4);
        if(spark>0.88){r=Math.min(1,r+0.5);g=Math.min(1,g+0.4);b=Math.min(1,b+0.2);}
        break;
      }
      case 'pulse': {
        const wave=0.5+0.5*Math.sin(pos*Math.PI*4-t*fs*3);
        r=wave*0.1; g=wave*0.8; b=wave;
        break;
      }
      case 'rainbow': { [r,g,b]=hsvToRgb((pos+t*fs*0.1)%1,1,1); break; }
    }
    if (pat !== 'unstable') {
      const sc = 1 - fd + fd*ledNoise(i,t,fs);
      r*=sc; g*=sc; b*=sc;
    }
    leds[i][0]=r; leds[i][1]=g; leds[i][2]=b;
  }
}

// ─── Field sampling ───────────────────────────────────────────────────────────
const colR=new Float32Array(W), colG=new Float32Array(W);
const colB=new Float32Array(W), colLum=new Float32Array(W);
let gBstart=0, gBend=0;

function sampleLEDField() {
  const n       = leds.length;
  const bladePx = Math.round(P.ledCount) * PX_PER_LED;
  const hiltPx  = P.hiltLedLen * PX_PER_LED;
  const totalW  = hiltPx + bladePx;
  const fullHiltPx = P.hiltLedLen * PX_PER_LED;
  const fullTipX   = W - RIGHT_MARGIN;
  const centerX    = fullTipX - (144 * PX_PER_LED + fullHiltPx) / 2;
  gBstart = centerX - totalW / 2 + hiltPx;
  gBend   = gBstart + bladePx;

  if (n===0) { colR.fill(0); colG.fill(0); colB.fill(0); colLum.fill(0); return; }

  const R=P.blendRadius, fo=P.falloff;
  for (let px=0; px<W; px++) {
    if (px<gBstart||px>gBend) { colR[px]=colG[px]=colB[px]=colLum[px]=0; continue; }
    const ledPos=((px-gBstart)/bladePx)*(n-1);
    let wr=0,wg=0,wb=0,wt=0;
    const iMin=Math.max(0,Math.floor(ledPos-R));
    const iMax=Math.min(n-1,Math.ceil(ledPos+R));
    for (let i=iMin; i<=iMax; i++) {
      const w=1.0/Math.pow(Math.abs(ledPos-i)+0.5,fo);
      wr+=leds[i][0]*w; wg+=leds[i][1]*w; wb+=leds[i][2]*w; wt+=w;
    }
    colR[px]=wr/wt; colG[px]=wg/wt; colB[px]=wb/wt;
    colLum[px]=Math.max(colR[px],colG[px],colB[px]);
  }
}

// ─── Hilt ─────────────────────────────────────────────────────────────────────
function drawHilt() {
  const cy        = H / 2;
  const hiltCapLen = (H / 2) * HILT_CAP_RADIUS * 2.0;
  const hiltRight = gBstart + hiltCapLen - P.hiltGap;
  const hiltLeft  = gBstart - P.hiltLedLen * PX_PER_LED;
  const hw        = P.hiltWidth * (H / 2);
  const crescent  = P.hiltCrescent;
  const drawLeft  = Math.max(0, hiltLeft);
  if (drawLeft >= hiltRight) return;

  const cd = hw * crescent;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(drawLeft,  cy - hw);
  ctx.lineTo(hiltRight, cy - hw);
  ctx.bezierCurveTo(
    hiltRight - cd, cy - hw * 0.25,
    hiltRight - cd, cy + hw * 0.25,
    hiltRight,      cy + hw
  );
  ctx.lineTo(drawLeft, cy + hw);
  ctx.closePath();
  ctx.clip();

  const grad = ctx.createLinearGradient(0, cy-hw, 0, cy+hw);
  grad.addColorStop(0.00, '#1a1a1a');
  grad.addColorStop(0.15, '#555');
  grad.addColorStop(0.30, '#999');
  grad.addColorStop(0.45, '#ccc');
  grad.addColorStop(0.50, '#e8e8e8');
  grad.addColorStop(0.55, '#bbb');
  grad.addColorStop(0.70, '#888');
  grad.addColorStop(0.85, '#444');
  grad.addColorStop(1.00, '#111');
  ctx.fillStyle = grad;
  ctx.fillRect(drawLeft, cy-hw, hiltRight-drawLeft, hw*2);

  ctx.strokeStyle='#000'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(drawLeft,cy-hw); ctx.lineTo(hiltRight,cy-hw);
  ctx.moveTo(drawLeft,cy+hw); ctx.lineTo(hiltRight,cy+hw);
  ctx.stroke();

  ctx.globalAlpha=0.18;
  const grooveSpacing = PX_PER_LED * 2;
  for (let gx=drawLeft; gx<hiltRight; gx+=grooveSpacing) {
    ctx.beginPath(); ctx.moveTo(gx,cy-hw); ctx.lineTo(gx,cy+hw); ctx.stroke();
  }
  ctx.globalAlpha=1.0;
  ctx.restore();
}

// ─── Blade renderer ───────────────────────────────────────────────────────────
const imgData=ctx.createImageData(W,H);
const pix=imgData.data;
const bloomCanvas=document.createElement('canvas');
bloomCanvas.width=W; bloomCanvas.height=H;
const bctx=bloomCanvas.getContext('2d');

function renderBlade() {
  pix.fill(0);
  const cy=H/2, halfH=H/2;
  const cw=P.coreWidth, es=P.edgeSoft, tf=P.tipFalloff;
  const bri=P.brightness, cWh=P.coreWhiten, sat=P.saturation;
  const bStart=gBstart, bEnd=gBend, bladeW=bEnd-bStart;

  if (bladeW<=0) { ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); return; }

  const capLen      = halfH*TIP_CAP_RADIUS*2.0;
  const capEdge     = bEnd-capLen;
  const hiltCapLen  = halfH*HILT_CAP_RADIUS*2.0;
  const hiltCapEdge = bStart+hiltCapLen;
  const hiltDepth   = P.hiltCurve;
  const whitenFadeStart = 1.0-CORE_WHITEN_FADE;

  // Precompute gamma inverse
  const gammaI = (P.gamma !== 1.0) ? 1 / P.gamma : 0;

  for (let px=0; px<W; px++) {
    if (px<bStart||px>bEnd) continue;
    let r=colR[px]*bri, g=colG[px]*bri, b=colB[px]*bri;

    // Per-channel gain + gamma for display calibration
    r = Math.min(1, r * P.gainR);
    g = Math.min(1, g * P.gainG);
    b = Math.min(1, b * P.gainB);
    if (gammaI) {
      if (r > 0) r = Math.pow(r, gammaI);
      if (g > 0) g = Math.pow(g, gammaI);
      if (b > 0) b = Math.pow(b, gammaI);
    }

    if (tf>0) {
      const tPos=(px-bStart)/bladeW;
      const tipZone=Math.max(0,(tPos-0.7)/0.3);
      const taper=1-tipZone*(1-Math.exp(-tf*3));
      r*=taper; g*=taper; b*=taper;
    }

    const sat_n=Math.max(r,g,b)*0.5;
    r=sat_n+(r-sat_n)*sat; g=sat_n+(g-sat_n)*sat; b=sat_n+(b-sat_n)*sat;

    let hiltRowScale=1.0, hiltFade=1.0;
    if (hiltCapLen>0&&px<=hiltCapEdge) {
      const t2=(hiltCapEdge-px)/hiltCapLen;
      hiltRowScale=Math.sqrt(Math.max(0,1-t2*t2));
      hiltFade=hiltRowScale;
      if (hiltRowScale<0.001) continue;
    }
    let tipRowScale=1.0, tipFade=1.0;
    if (capLen>0&&px>=capEdge) {
      const t2=(px-capEdge)/capLen;
      tipRowScale=Math.sqrt(Math.max(0,1-t2*t2));
      tipFade=tipRowScale;
      if (tipRowScale<0.001) continue;
    }

    const rowScale    =Math.min(hiltRowScale,tipRowScale);
    const combinedFade=Math.min(hiltFade,tipFade);
    const usableHalf  =halfH*rowScale;
    const bladePos    =(px-bStart)/bladeW;

    let whitenMult=1.0;
    if (CORE_WHITEN_FADE>0&&bladePos>whitenFadeStart) {
      const fadeT=(bladePos-whitenFadeStart)/(1.0-whitenFadeStart+0.001);
      whitenMult=Math.max(0,1.0-fadeT*fadeT*3.0);
    }

    for (let py=0; py<H; py++) {
      const absDy=Math.abs(py-cy);
      const dy=absDy/(usableHalf+0.001);
      if (dy>3.0) continue;

      let edgeDim=1.0;
      if (hiltDepth>0) {
        const hz=Math.max(0,1.0-bladePos/0.25);
        const edgeness=Math.min(1,absDy/(usableHalf+0.001));
        edgeDim=1.0-hiltDepth*0.5*hz*Math.pow(edgeness,1.5);
      }

      const coreAlpha =Math.max(0,1-dy/cw);
      const outerAlpha=Math.exp(-Math.pow(dy/cw,es));
      const alpha     =Math.max(coreAlpha,outerAlpha)*combinedFade*edgeDim;
      const wh=coreAlpha*cWh*whitenMult*tipFade;
      const fr=Math.min(1,(r+(1-r)*wh)*alpha);
      const fg=Math.min(1,(g+(1-g)*wh)*alpha);
      const fb=Math.min(1,(b+(1-b)*wh)*alpha);
      const idx=(py*W+px)*4;
      pix[idx]=fr*255; pix[idx+1]=fg*255; pix[idx+2]=fb*255; pix[idx+3]=255;
    }
  }

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  ctx.putImageData(imgData,0,0);
}

function renderBloom() {
  if (P.bloomIntensity<0.01) return;
  const cy=H/2, bri=P.brightness;

  const tipIdx=Math.max(0,Math.min(W-1,Math.floor(gBend)-1));
  const tipR=colR[tipIdx]*bri, tipG=colG[tipIdx]*bri, tipBv=colB[tipIdx]*bri;
  const tipLum=Math.max(tipR,tipG,tipBv);
  const overhang=P.bloomRadius*1.5;

  // Bloom cap fade: match blade cap arc at emitter
  const hiltCapLen  = (H/2) * HILT_CAP_RADIUS * 2.0;
  const hiltCapEdge = gBstart + hiltCapLen - P.hiltGap;

  bctx.clearRect(0,0,W,H);
  for (let px=0; px<W; px++) {
    let rv, gv, bv, lum;
    if (px<=gBend) {
      lum=colLum[px]*bri;
      if (lum<0.005) continue;
      rv=colR[px]*bri; gv=colG[px]*bri; bv=colB[px]*bri;
    } else {
      const dist=px-gBend;
      if (dist>overhang) continue;
      const fade=Math.exp(-dist/(overhang*0.4));
      lum=tipLum*fade;
      if (lum<0.005) continue;
      rv=tipR*fade; gv=tipG*fade; bv=tipBv*fade;
    }
    let capFade = 1.0;
    if (px >= gBstart && px < hiltCapEdge && hiltCapLen > 0) {
      const t2 = (hiltCapEdge - px) / hiltCapLen;
      capFade = Math.sqrt(Math.max(0, 1 - t2 * t2));
    }
    const brad=P.bloomRadius*Math.pow(Math.max(0.0001,lum),1.0/P.bloomSens)*capFade;
    if (!isFinite(brad)||brad<1) continue;
    const alpha=Math.min(1,lum*P.bloomIntensity*0.4*capFade);
    const grad=bctx.createLinearGradient(px,cy-brad,px,cy+brad);
    const c=`rgba(${(rv*255)|0},${(gv*255)|0},${(bv*255)|0},`;
    grad.addColorStop(0,c+'0)');
    grad.addColorStop(0.5,c+alpha+')');
    grad.addColorStop(1,c+'0)');
    bctx.fillStyle=grad;
    bctx.fillRect(px,cy-brad,1,brad*2);
  }
  ctx.globalCompositeOperation='screen';
  ctx.drawImage(bloomCanvas,0,0);
  ctx.globalCompositeOperation='source-over';
}

// ─── Animation loop ───────────────────────────────────────────────────────────
let lastT=0, frameCount=0, fpsTimer=0;
const fpsEl=document.getElementById('fps');
const prevColR=new Float32Array(W), prevColG=new Float32Array(W), prevColB=new Float32Array(W);
let motionBlurInit=false;

function frame(ts) {
  const t=ts*0.001, dt=t-lastT; lastT=t;
  frameCount++; fpsTimer+=dt;
  if (fpsTimer>=0.5){ fpsEl.textContent=Math.round(frameCount/fpsTimer)+' fps'; frameCount=0; fpsTimer=0; }
  generateLEDs(t);
  if (motionBlurInit){ prevColR.set(colR); prevColG.set(colG); prevColB.set(colB); }
  sampleLEDField();
  const blur=0.18;
  if (motionBlurInit){
    for(let i=0;i<W;i++){
      colR[i]=colR[i]*(1-blur)+prevColR[i]*blur;
      colG[i]=colG[i]*(1-blur)+prevColG[i]*blur;
      colB[i]=colB[i]*(1-blur)+prevColB[i]*blur;
    }
  }
  motionBlurInit=true;
  renderBlade();
  drawHilt();
  renderBloom();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ─── postMessage: init from parent, save/cancel to parent ─────────────────────
// Keys in the init/save values object match P property names.
// Keys that map to bladeRenderer.js consts (saved to file):
const SAVEABLE = ['blendRadius','falloff','coreWidth','edgeSoft','tipFalloff','coreWhiten',
  'bloomIntensity','bloomRadius','bloomSens','saturation','hiltCurve','hiltLedLen','hiltWidth',
  'gainR','gainG','gainB','gamma','hiltCrescent','hiltGap'];

function applyValues(vals) {
  for (const key of Object.keys(vals)) {
    if (key in P) P[key] = (key === 'pattern') ? vals[key] : parseFloat(vals[key]);
    syncSliderDisplay(key, P[key]);
  }
  const sel = document.getElementById('pattern');
  if (sel && vals.pattern) sel.value = vals.pattern;
}

function notifyParent() {
  const vals = {};
  for (const k of SAVEABLE) vals[k] = P[k];
  window.parent.postMessage({ type: 'tuner:change', values: vals }, '*');
}

window.addEventListener('message', (e) => {
  if (!e.data) return;
  if (e.data.type === 'tuner:init') {
    applyValues(Object.assign({}, DEFAULTS, e.data.values || {}));
    setStatus('');
    // Immediately push current values to parent so _tuning is always fresh on open
    notifyParent();
  } else if (e.data.type === 'tuner:status') {
    setStatus(e.data.msg, e.data.cls);
  }
});

document.getElementById('btn-save').addEventListener('click', () => {
  const vals = {};
  for (const k of SAVEABLE) vals[k] = P[k];
  window.parent.postMessage({ type: 'tuner:save', values: vals }, '*');
});

document.getElementById('btn-cancel').addEventListener('click', () => {
  window.parent.postMessage({ type: 'tuner:cancel' }, '*');
});

document.getElementById('btn-reset').addEventListener('click', () => {
  applyValues(Object.assign({}, DEFAULTS));
  setStatus('Reset to defaults');
});

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}
</script>
